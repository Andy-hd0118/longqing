<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>信息发布平台 - 管理后台</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="uiverse-buttons.css">
</head>
<body>
    <header>
        <nav class="admin-nav">
            <div class="nav-brand">管理后台</div>
            <div class="nav-links">
                <a href="index.html" target="_blank">查看用户端</a>
            </div>
        </nav>
    </header>

    <main>
        <section id="announcements-management" class="admin-section">
            <div class="container">
                <h2>公告管理</h2>
                
                <div class="form-card">
                    <h3>发布新公告</h3>
                    <div class="form-group">
                        <label>公告标题</label>
                        <input type="text" id="announcement-title" placeholder="输入公告标题">
                    </div>
                    <div class="form-group">
                        <label>公告内容</label>
                        <textarea id="announcement-content" rows="5" placeholder="输入公告内容"></textarea>
                    </div>
                    <div class="form-group">
                        <label>优先级</label>
                        <select id="announcement-priority">
                            <option value="normal">普通</option>
                            <option value="important">重要</option>
                            <option value="urgent">紧急</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>公告图片（可选）</label>
                        <input type="file" id="announcement-image" accept="image/*">
                        <div id="image-preview" style="margin-top: 10px;"></div>
                    </div>
                    <button class="admin-btn primary" onclick="addAnnouncement()">发布公告</button>
                </div>

                <div class="announcements-list">
                    <h3>已发布公告</h3>
                    <div id="admin-announcements-container"></div>
                </div>
            </div>
        </section>
    </main>

    <script src="admin.js"></script>
</body>
</html>
